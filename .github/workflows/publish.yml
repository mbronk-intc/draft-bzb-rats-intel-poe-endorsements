name: "Publish New Draft Version"

on:
  push:
    tags:
      - "draft-*"
  workflow_dispatch:
    inputs:
      email:
        description: "Submitter email"
        default: ""
        type: string

jobs:
  build:
    name: "Publish New Draft Version"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: "Checkout"
      uses: actions/checkout@v7
      with:
        # Needed for tracing file history for replacement status
        fetch-depth: 0
        fetch-tags: true

    # See https://github.com/actions/checkout/issues/290
    - name: "Get Tag Annotations"
      run: git fetch -f origin ${{ github.ref }}:${{ github.ref }}

    - name: "Setup"
      id: setup
      run: date -u "+date=%FT%T" >>"$GITHUB_OUTPUT"

    - name: "Caching"
      uses: actions/cache@v6
      with:
        path: |
          .refcache
          .venv
          .gems
          node_modules
          .targets.mk
        key: i-d-${{ steps.setup.outputs.date }}
        restore-keys: i-d-

    - name: "Build Drafts"
      id: build
      uses: martinthomson/i-d-template@v1
      with:
        make: releases
        token: ${{ github.token }}

    - name: "Upload to Datatracker"
      uses: martinthomson/i-d-template@v1
      with:
        make: upload
      env:
        UPLOAD_EMAIL: ${{ inputs.email }}
        GITHUB_STEP: upload

    - name: "Archive Submitted Drafts"
      uses: actions/upload-artifact@v7
      if: always() && steps.build.outcome == 'success'
      with:
        name: published
        path: "versioned/draft-*-[0-9][0-9].*"

    # Attach the POE profile CDDL grammar to the draft's GitHub Release, so every
    # published draft version ships the matching downloadable CDDL (in addition
    # to the standalone `cddl-*` releases; see RELEASE_CDDL.md).
    - name: "Attach CDDL to Release"
      uses: softprops/action-gh-release@v3
      if: startsWith(github.ref, 'refs/tags/') && steps.build.outcome == 'success'
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        files: |
          ./cddl/exports/intel-poe-profile.cddl

