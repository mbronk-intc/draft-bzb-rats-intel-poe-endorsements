name: "Release CDDL"

# Publish the POE profile CDDL grammar (cddl/exports/intel-poe-profile.cddl) as a
# downloadable GitHub Release asset. This mirrors the convention used by the base
# CoRIM (ietf-rats-wg/draft-ietf-rats-corim) and the Intel CoRIM profile
# (fchinchilla/draft-cds-rats-intel-corim-profile): a maintainer pushes a
# `cddl-*` tag, and that tag triggers this workflow. See RELEASE_CDDL.md.

on:
  push:
    tags:
      - "cddl-*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: "Release CDDL"
    runs-on: ubuntu-latest
    steps:
    - name: "Checkout"
      uses: actions/checkout@v6

    - name: "Setup"
      id: setup
      run: date -u "+date=%FT%T" >>"$GITHUB_OUTPUT"

    - name: "Caching"
      uses: actions/cache@v5
      with:
        path: |
          .refcache
          .venv
          .gems
          node_modules
          .targets.mk
        key: i-d-${{ steps.setup.outputs.date }}
        restore-keys: i-d-

    - name: "Validate CDDL"
      uses: martinthomson/i-d-template@v1
      with:
        make: check-cddl
        token: ${{ github.token }}

    - name: "Create Release"
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        files: |
          ./cddl/exports/intel-poe-profile.cddl
