name: "Release CDDL"

# Publish the POE profile CDDL grammar (cddl/exports/intel-poe-profile.cddl) as a
# downloadable GitHub Release asset. This mirrors the convention used by the base
# CoRIM (ietf-rats-wg/draft-ietf-rats-corim) and the Intel CoRIM profile
# (fchinchilla/draft-cds-rats-intel-corim-profile): a maintainer pushes a
# `cddl-*` tag, and that tag triggers this workflow. See RELEASE_CDDL.md.

on:
  push:
    tags:
      - "cddl-*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: "Release CDDL"
    runs-on: ubuntu-latest
    steps:
    - name: "Checkout"
      uses: actions/checkout@v6

    # make check-cddl needs the Ruby cddl gem (absent from the i-d-template image).
    - name: "Set up Ruby (cddl + cbor-diag)"
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: "3.3"

    - name: "Install cddl + cbor-diag gems"
      run: gem install --no-document cddl cbor-diag

    - name: "Validate CDDL"
      run: make check-cddl

    - name: "Create Release"
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        files: |
          ./cddl/exports/intel-poe-profile.cddl
